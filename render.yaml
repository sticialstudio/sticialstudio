services:
  - type: web
    name: sticialstudio-api
    runtime: node
    plan: starter
    healthCheckPath: /api/health
    buildCommand: npm ci --include=dev --workspace apps/api --workspace packages/database --include-workspace-root=false && npm --workspace packages/database run db:generate && npm --workspace packages/database run build
    startCommand: npm --workspace packages/database run db:push && node apps/api/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
    disk:
      name: api-data
      mountPath: /var/data
      sizeGB: 1